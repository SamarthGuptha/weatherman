<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <title>Weatherman</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: {{ bg_color }};
            color: {{ text_color }};
            transition: background-color 0.8s ease, color 0.8s ease;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            letter-spacing: -2px;
            font-weight: 900;
        }
        p.snark {
            font-size: 1.8rem;
            max-width: 700px;
            margin: 10px auto 50px auto;
            font-weight: 500;
            line-height: 1.4;

        }
        .form-container {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        input[type="text"] {
            padding: 14px;
            font-size: 1.1rem;
            border: 2px solid transparent;
            border-radius: 8px;
            outline: none;
            width: 200px;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            border: 2px solid {{ text_colour }};
        }
        button {
            padding: 14px 24px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            background-color: {{ text_color }};
            color: {{ bg_color }};
        }
    </style>
</head>
</html>
